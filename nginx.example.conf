# Nginx sample for feedbackForm (php-fpm)
# - Frontend static files: web/dist
# - Backend API: /api -> server/public/index.php via php-fpm
#
# !! Only change these two lines to adapt to your server !!
# 1) $project_root  — absolute path to the feedbackForm directory
# 2) fastcgi_pass   — your php-fpm socket or TCP address

server {
    listen 80;
    server_name example.com;

    # ===== CHANGE THIS to your actual project path =====
    set $project_root /var/www/feedbackForm;
    # ====================================================

    root $project_root/web/dist;
    index index.html;

    # Allow uploads up to 20 MB.
    # Keep this >= PHP post_max_size and >= app upload_max_bytes.
    client_max_body_size 20m;

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API entry
    # - query style: /api?s=mod/SubModuleName/FunctionName
    # - path style:  /api/mod/SubModuleName/FunctionName
    location ~ ^/api(?:/.*)?$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $project_root/server/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param HTTPS           $https if_not_empty;

        # Keep PHP upload limits aligned with Nginx.
        # If your environment ignores PHP_VALUE, set these in php.ini/php-fpm pool.
        fastcgi_param PHP_VALUE "post_max_size=20M\nupload_max_filesize=20M\nmax_file_uploads=20";

        # ===== CHANGE THIS to your php-fpm socket or TCP =====
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        # fastcgi_pass 127.0.0.1:9000;
        # =====================================================
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
