server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/api(?:/.*)?$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/app/server/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param PHP_VALUE "post_max_size=${PHP_POST_MAX_SIZE}\nupload_max_filesize=${PHP_UPLOAD_MAX_FILESIZE}\nmax_file_uploads=${PHP_MAX_FILE_UPLOADS}";
        fastcgi_pass php-fpm:9000;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
